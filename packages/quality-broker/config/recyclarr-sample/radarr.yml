# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
# ============================================================
# Recyclarr configuration – Tier-first scoring + custom size limits
# ============================================================
#
# Philosophy:
# - Tiers are the primary quality differentiator (boosted to 3000-3500)
# - Audio is secondary; TrueHD ATMOS vs DD+ ATMOS gap narrowed to 500
# - HighQuality-4K: WEB tier scores lowered so Bluray is preferred
# - 4K profiles fall back to HD when no 4K release available
# - Custom size limits to enforce storage budget (15-20GB 4K)
# - Block Remux/HDTV via size caps (min:0, max:1)
#
# ============================================================

radarr:
  radarr_main:
    base_url: !secret radarr_url
    api_key: !secret radarr_api_key

    include:
      - config: ../includes/radarr-quality-profiles.yml

    # Custom size limits (this is the only customization)
    quality_definition:
      type: movie
      qualities:
        # Blocked (deterministic reject via size caps)
        - { name: HDTV-720p,   min: 0, preferred: 1, max: 1 }
        - { name: HDTV-1080p,  min: 0, preferred: 1, max: 1 }
        - { name: HDTV-2160p,  min: 0, preferred: 1, max: 1 }
        - { name: WEBRip-720p, min: 0, preferred: 1, max: 1 }
        - { name: WEBRip-1080p, min: 0, preferred: 1, max: 1 }
        - { name: WEBRip-2160p, min: 0, preferred: 1, max: 1 }
        - { name: Remux-1080p, min: 0, preferred: 1, max: 1 }
        - { name: Remux-2160p, min: 0, preferred: 1, max: 1 }

        # 720p (fallback)
        - { name: WEBDL-720p,  min: 6,  preferred: 12, max: 22 }
        - { name: Bluray-720p, min: 10, preferred: 18, max: 32 }

        # 1080p
        - { name: WEBDL-1080p,  min: 12, preferred: 40, max: 140 }
        - { name: Bluray-1080p, min: 18, preferred: 40, max: 140 }

        # 2160p (up to ~22GB for 2h titles)
        - { name: WEBDL-2160p,  min: 25, preferred: 85,  max: 190 }
        - { name: Bluray-2160p, min: 45, preferred: 100, max: 190 }

    # ------------------------------------------------------
    # CF Scoring: Tier-first, audio secondary
    # ------------------------------------------------------
    # Scoring hierarchy (highest → lowest influence):
    #   1. Release group tiers (3000-3500) — primary differentiator
    #   2. Audio codecs (1750-3500) — secondary, narrow ATMOS gap
    #   3. HDR/DV flags (500) — tiebreaker
    #   4. Streaming services (0 default, or negative on HQ-4K)
    #
    # HighQuality-4K: WEB tiers scored lower than Bluray tiers
    # so Bluray encodes are preferred when available.
    # ------------------------------------------------------
    # Synced from live Radarr profile scores on 2026-03-09
    custom_formats:
      - trash_ids:
          - a5d148168c4506b55cf53984107c396e # 10bit
        assign_scores_to:
          - { name: HD, score: 0 }
          - { name: Efficient-4K, score: 0 }
          - { name: HighQuality-4K, score: 0 }

