## TRaSH Guides: [SQP] SQP-1 WEB (2160p)
################################################################################

radarr:
  radarr_main:
    base_url: !secret radarr_url
    api_key: !secret radarr_api_key

    quality_definition:
      type: sqp-streaming

    quality_profiles:
      - trash_id: e91c9adaca0231493f4af0d571b907f9  # [SQP] SQP-1 WEB (2160p)
        name: 4K-Efficient
        reset_unmatched_scores:
          enabled: true
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f  # UHD Bluray + WEB
        name: 4K-Bluray
        reset_unmatched_scores:
          enabled: true
      - trash_id: fd161a61e3ab826d3a22d53f935696dd  # Remux + WEB 2160p
        name: 4K-Remux
        # WEBRip-2160p removed from allowed qualities — blocked by release regex; Remux + WEBDL only
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
