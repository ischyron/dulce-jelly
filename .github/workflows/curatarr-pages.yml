name: Deploy Curatarr GitHub Page

on:
  push:
    branches: [main]
    paths:
      - 'packages/curatarr/docs/site/**'
      - 'packages/curatarr/docs/api/**'
      - 'packages/curatarr/scripts/build-openapi-docs.mjs'
      - 'packages/curatarr/package.json'
      - 'package-lock.json'
      - '.github/workflows/curatarr-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'curatarr-pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenAPI docs
        run: npm run docs:api:build --workspace=packages/curatarr

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/curatarr/docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
