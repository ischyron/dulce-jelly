services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: "${BASIC_AUTH_USER}"
      BASIC_AUTH_HASH: "${BASIC_AUTH_HASH}"
      CADDY_AUTH_ENABLED: "${CADDY_AUTH_ENABLED:-true}"
      JELLYFIN_AUTH_ENABLED: "${JELLYFIN_AUTH_ENABLED:-false}"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/site:/srv:ro
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1s
    depends_on:
      - jellyfin
      - jellyseerr
      - streamystats
      - qbittorrent
      - prowlarr
      - radarr
      - sabnzbd

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    hostname: cloudflared
    restart: unless-stopped
    depends_on:
      - caddy
    command: tunnel --config /etc/cloudflared/config.yml --metrics 0.0.0.0:2000 run
    volumes:
      - ./cloudflared:/etc/cloudflared
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1s

  jellyfin:
    image: ghcr.io/jellyfin/jellyfin:10.11.8
    container_name: jellyfin
    hostname: jellyfin
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
      JELLYFIN_PublishedServerUrl: "${JELLYFIN_PUBLISHED_URL:-}"
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${JELLYFIN_HTTP_PORT:-3278}:8096"
      - "${JELLYFIN_HTTPS_PORT:-3279}:8920"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/config/index.html:/jellyfin/jellyfin-web/index.html
      - ./data/jellyfin/cache:/cache
      # Transcode cache (expendable volume with free space)
      - "${JELLYFIN_TRANSCODE_PATH}:/cache/transcodes"
      # Stable host mounts → stable container mounts
      - "${JELLYFIN_MOVIES}:/Volumes/Movies"
      - "${JELLYFIN_SERIES}:/Volumes/Series"
    entrypoint: ["/bin/sh", "-c"]
    command:
      # Keep Jellyfin's *existing* library roots stable by providing /Volumes/Movies + /Volumes/Series inside container
      - "mkdir -p /Volumes && ln -sfn /media/movies /Volumes/Movies && ln -sfn /media/series /Volumes/Series && exec /jellyfin/jellyfin"

      
  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    hostname: jellyseerr
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      PORT: "5055"
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${JELLYSEERR_PORT:-3277}:5055"
    volumes:
      - ./data/jellyseerr/config:/app/config
      - ./data/jellyseerr/cache:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  streamystats:
    image: ghcr.io/fredrikburmester/streamystats-nextjs:latest
    container_name: streamystats
    hostname: streamystats
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${STREAMYSTATS_POSTGRES_USER}:${STREAMYSTATS_POSTGRES_PASSWORD}@streamystats-db:5432/${STREAMYSTATS_POSTGRES_DB:-streamystats}"
      JOB_SERVER_URL: http://streamystats-job:3005
      HOSTNAME: 0.0.0.0
      SESSION_SECRET: "${STREAMYSTATS_SESSION_SECRET}"
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: "${STREAMYSTATS_ACTIONS_ENCRYPTION_KEY}"
    ports:
      - "${STREAMYSTATS_PORT:-3267}:3000"
    depends_on:
      streamystats-db:
        condition: service_healthy
      streamystats-job:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  streamystats-job:
    image: ghcr.io/fredrikburmester/streamystats-job-server:latest
    container_name: streamystats-job
    hostname: streamystats-job
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${STREAMYSTATS_POSTGRES_USER}:${STREAMYSTATS_POSTGRES_PASSWORD}@streamystats-db:5432/${STREAMYSTATS_POSTGRES_DB:-streamystats}"
      PORT: 3005
      HOST: 0.0.0.0
      SESSION_POLL_INTERVAL_MS: "${STREAMYSTATS_SESSION_POLL_INTERVAL_MS:-5000}"
      CRON_ACTIVITY_SYNC: "${STREAMYSTATS_CRON_ACTIVITY_SYNC:-*/1 * * * *}"
      CRON_RECENT_ITEMS_SYNC: "${STREAMYSTATS_CRON_RECENT_ITEMS_SYNC:-*/1 * * * *}"
      CRON_USER_SYNC: "${STREAMYSTATS_CRON_USER_SYNC:-*/1 * * * *}"
      CRON_PEOPLE_SYNC: "${STREAMYSTATS_CRON_PEOPLE_SYNC:-*/15 * * * *}"
      CRON_EMBEDDINGS_SYNC: "${STREAMYSTATS_CRON_EMBEDDINGS_SYNC:-*/15 * * * *}"
      CRON_GEOLOCATION_SYNC: "${STREAMYSTATS_CRON_GEOLOCATION_SYNC:-*/5 * * * *}"
      CRON_FINGERPRINT_SYNC: "${STREAMYSTATS_CRON_FINGERPRINT_SYNC:-0 4 * * *}"
      CRON_JOB_CLEANUP: "${STREAMYSTATS_CRON_JOB_CLEANUP:-*/1 * * * *}"
      CRON_OLD_JOB_CLEANUP: "${STREAMYSTATS_CRON_OLD_JOB_CLEANUP:-0 3 * * *}"
      CRON_FULL_SYNC: "${STREAMYSTATS_CRON_FULL_SYNC:-0 2 * * *}"
      CRON_DELETED_ITEMS_CLEANUP: "${STREAMYSTATS_CRON_DELETED_ITEMS_CLEANUP:-0 * * * *}"
      SKIP_STARTUP_FULL_SYNC: "${STREAMYSTATS_SKIP_STARTUP_FULL_SYNC:-false}"
    depends_on:
      streamystats-db:
        condition: service_healthy

  streamystats-db:
    image: tensorchord/vchord-postgres:pg17-v0.4.1
    container_name: streamystats-db
    hostname: streamystats-db
    restart: unless-stopped
    command: ["postgres", "-c", "log_checkpoints=off"]
    environment:
      POSTGRES_USER: "${STREAMYSTATS_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${STREAMYSTATS_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${STREAMYSTATS_POSTGRES_DB:-streamystats}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - ./data/streamystats/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STREAMYSTATS_POSTGRES_USER} -d ${STREAMYSTATS_POSTGRES_DB:-streamystats}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
      WEBUI_PORT: "8080"
      UMASK_SET: "${UMASK_SET:-002}"  # allow group write for shared media
    ports:
      - "127.0.0.1:${QBITTORRENT_WEB_PORT:-3275}:8080"
      - "${QBITTORRENT_PEER_PORT:-6881}:6881"
      - "${QBITTORRENT_PEER_PORT:-6881}:6881/udp"
    volumes:
      - ./data/qbittorrent/config:/config
      - "${DOWNLOADS_ROOT:-/Volumes/SCRAPFS/MediaCenter/downloads}:/downloads"
      - "${QBITTORRENT_WATCH:-~/Downloads}:/watch"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    restart: unless-stopped
    depends_on:
      - flaresolverr
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
    ports:
      - "${PROWLARR_PORT:-3276}:9696"
    volumes:
      - ./data/prowlarr/config:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
    ports:
      - "${RADARR_PORT:-3273}:7878"
    volumes:
      - ./data/radarr/config:/config
      - "${DOWNLOADS_ROOT:-/Volumes/SCRAPFS/MediaCenter/downloads}:/downloads"
      - "${JELLYFIN_MOVIES:-~/Media/MEDIA1/Movies}:/movies"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7878/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    hostname: sabnzbd
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
      UMASK_SET: "${UMASK_SET:-002}"
    ports:
      - "${SABNZBD_PORT:-3274}:8080"
    volumes:
      - ./data/sabnzbd/config:/config
      - "${DOWNLOADS_ROOT:-/Volumes/SCRAPFS/MediaCenter/downloads}:/downloads"
      - "${INCOMPLETE_ROOT:-/Volumes/SCRAPFS/MediaCenter/downloads/incomplete}:/incomplete"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls305
    container_name: sonarr
    hostname: sonarr
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
    ports:
      - "${SONARR_PORT:-3272}:8989"
    volumes:
      - ./data/sonarr/config:/config
      - "${DOWNLOADS_ROOT:-/Volumes/SCRAPFS/MediaCenter/downloads}:/downloads"
      - "${JELLYFIN_SERIES:-~/Media/MEDIA1/Series}:/series"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8989/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  curatarr:
    build:
      context: ./packages/curatarr
      dockerfile: Dockerfile
    image: curatarr:latest
    container_name: curatarr
    hostname: curatarr
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-UTC}"
    ports:
      - "${CURATARR_HOST_PORT:-3270}:7474"
    volumes:
      - ./data/curatarr/config:/config   # config.yaml, scoring.yaml, secrets.yaml
      - ./data/curatarr/data:/data       # sqlite db (set paths.dbPath to /data/curatarr.db)
      - "${JELLYFIN_MOVIES}:/media:ro"   # host movies folder → /media inside container
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7474/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  huntarr:
    image: huntarr/huntarr:latest
    container_name: huntarr
    hostname: huntarr
    restart: unless-stopped
    ports:
      - "${HUNTARR_PORT:-3271}:9705"
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
      BASE_URL: "${HUNTARR_BASE_URL:-}"
    volumes:
      - ./data/huntarr/config:/config
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; import sys; r = requests.get('http://localhost:9705/api/health', timeout=5); sys.exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
      LOG_LEVEL: "${FLARESOLVERR_LOG_LEVEL:-info}"
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tashkent}"
    ports:
      - "${BAZARR_PORT:-3268}:6767"
    volumes:
      - ./data/bazarr/config:/config
      - "${JELLYFIN_MOVIES:-~/Media/MEDIA1/Movies}:/movies"
      - "${JELLYFIN_SERIES:-~/Media/MEDIA1/Series}:/series"
    depends_on:
      - radarr
      - sonarr
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6767/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  autosubsync:
    build:
      context: https://github.com/denizsafak/AutoSubSync.git
    image: autosubsync:latest
    platform: linux/amd64   # assy/PyQt6 has no arm64 wheel; run under Rosetta on Apple Silicon
    container_name: autosubsync
    hostname: autosubsync
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
    ports:
      - "${AUTOSUBSYNC_PORT:-3269}:6080"
    volumes:
      - ./data/autosubsync/input:/app/input
      - ./data/autosubsync/output:/app/output
      - ./data/autosubsync/desktop:/home/autosubsync/Desktop
      - "${JELLYFIN_MOVIES:-~/Media/MEDIA1/Movies}:/movies"
      - "${JELLYFIN_SERIES:-~/Media/MEDIA1/Series}:/series"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    hostname: recyclarr
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Asia/Tashkent}"
      CRON_SCHEDULE: "${RECYCLARR_CRON:-0 4 * * *}"
      LOG_LEVEL: "debug"
    volumes:
      - ./data/recyclarr/config:/config

  storage-utils:
    build:
      context: ./storage-utils
      dockerfile: Dockerfile
    image: storage-utils:latest
    container_name: storage-utils
    hostname: storage-utils
    profiles:
      - storage-utils
    privileged: true
    network_mode: none
    volumes:
      - /dev:/dev

networks:
  default:
    name: media_net
    external: true
