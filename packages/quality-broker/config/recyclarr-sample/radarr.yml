################################################################################
## [Anime] BD + WEB — covers 1080p BD-rip groups AND streaming/2160p when available
## Quality definition: anime (calibrated min/max for anime encodes)
## Profile: based on TRaSH [Anime] Remux-1080p, renamed and scored for wider use
## After sync: patch profile via Radarr API to allow Bluray-2160p + WEBDL-2160p
################################################################################

  radarr_anime:
    base_url: !secret radarr_url
    api_key: !secret radarr_api_key

    quality_definition:
      type: anime

    # No quality_profiles entry here — profile is created directly via Radarr API
    # to avoid Recyclarr instance-ownership conflicts with CFs owned by radarr_main.
    # Recyclarr's role here: create the new anime-specific CFs only.

    custom_formats:
      # ── Anime BD release group tiers ─────────────────────────────────────
      # x265/10bit intentionally NOT assigned — reset_unmatched_scores sets them to 0
