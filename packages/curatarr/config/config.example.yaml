# Curatarr runtime configuration
# Copy to one of:
# - data/curatarr/config/config.yaml (repo/local default)
# - /config/config.yaml (docker volume)

server:
  host: 0.0.0.0
  port: 7474

paths:
  # Base path defaults to ./data/curatarr from current working directory.
  # This typically maps to the folder where docker compose runs.
  curatarrDataPath: ./data/curatarr

  # Optional explicit DB override. Relative paths resolve from this config file folder.
  dbPath: ../data/curatarr.db

settings:
  # Jellyfin
  jellyfinUrl: http://jellyfin:8096
  jellyfinPublicUrl: http://localhost:3278

  # Library root folders as seen by Curatarr process/container
  libraryRoots:
    - type: movies
      path: /media/Movies
    - type: series
      path: /media/Series

  # Prowlarr
  prowlarrUrl: http://prowlarr:9696

  # Scout queue defaults
  scoutPipelineMinCritic: "65"
  scoutPipelineMinImdb: "7.0"
  scoutMaxResolution: "2160p"
  scoutPipelineBatchSize: "5"

  # Scout scheduler
  scoutPipelineAutoEnabled: "false"
  scoutPipelineAutoIntervalMin: "60"
  scoutPipelineAutoCooldownMin: "240"

  # Jellyfin sync scheduler
  jfSyncIntervalMin: "30"
  jfSyncBatchSize: "10"

# Secrets (API keys, LLM provider/key) belong in config/secrets.yaml.
# CF scoring defaults belong in config/scoring.yaml.
